name: Generate profile stats cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats card (dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PROFILE_README_TOKEN }}
          filename: stats-card-dark.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Tunis
          config_padding: 0, 8 + 11%
          config_display: large
          output_action: commit
          committer_branch: output
          committer_message: "chore: update stats cards [skip ci]"

      - name: Generate stats card (light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PROFILE_README_TOKEN }}
          filename: stats-card-light.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Tunis
          config_padding: 0, 8 + 11%
          config_display: large
          config_theme: light
          output_action: commit
          committer_branch: output
          committer_message: "chore: update stats cards [skip ci]"

      - name: Generate top languages card (dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PROFILE_README_TOKEN }}
          filename: top-langs-dark.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_ignored: html, css
          config_timezone: Africa/Tunis
          config_padding: 0, 8 + 11%
          output_action: commit
          committer_branch: output
          committer_message: "chore: update language cards [skip ci]"

      - name: Generate top languages card (light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PROFILE_README_TOKEN }}
          filename: top-langs-light.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_ignored: html, css
          config_theme: light
          config_timezone: Africa/Tunis
          config_padding: 0, 8 + 11%
          output_action: commit
          committer_branch: output
          committer_message: "chore: update language cards [skip ci]"
