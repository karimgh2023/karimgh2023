name: Generate streak cards

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare output branch
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . || true
          fi

      - name: Generate streak card (dark)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=karimgh2023&theme=tokyonight&hide_border=true
          path: streak-dark.svg
          token: ${{ secrets.PROFILE_README_TOKEN }}

      - name: Generate streak card (light)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=karimgh2023&theme=default&hide_border=true
          path: streak-light.svg
          token: ${{ secrets.PROFILE_README_TOKEN }}

      - name: Commit streak cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streak-dark.svg streak-light.svg
          git commit -m "chore: update streak cards [skip ci]" || exit 0
          git push origin output
